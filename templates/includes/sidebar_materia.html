{% comment %}Requiere: materia, periodo_actual, periodos, modulo_activo{% endcomment %}
<div class="sidebar-divider"></div>
<div class="sidebar-label" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:6px;" title="{{ materia.grado.nombre }} · {{ materia.nombre }}">{{ materia.nombre }}</div>

<div class="periodo-selector">
  <div class="periodo-selector-label">Periodo</div>
  <div class="periodo-btns">
    {% for num, label in periodos %}
    <a href="?periodo={{ num }}" class="periodo-btn {% if num == periodo_actual %}active{% endif %}" onclick="localStorage.setItem('periodo','{{ num }}')">P{{ num }}</a>
    {% endfor %}
  </div>
</div>

<div style="height:8px;"></div>

<div class="sidebar-sub">
  <a href="{% url 'detalle_materia' materia.id %}?periodo={{ periodo_actual }}" class="sidebar-sublink {% if modulo_activo == 'notas' %}active{% endif %}">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 12h16.5m-16.5 3.75h16.5M3.75 19.5h16.5M5.625 4.5h12.75a1.875 1.875 0 010 3.75H5.625a1.875 1.875 0 010-3.75z"/></svg>
    Notas
  </a>
  <a href="{% url 'asistencia_materia' materia.id %}?periodo={{ periodo_actual }}" class="sidebar-sublink {% if modulo_activo == 'asistencia' %}active{% endif %}">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    Asistencia
  </a>
  <a href="{% url 'comportamiento_materia' materia.id %}?periodo={{ periodo_actual }}" class="sidebar-sublink {% if modulo_activo == 'comportamiento' %}active{% endif %}">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg>
    Comportamiento
  </a>
  <a href="{% url 'actividades_materia' materia.id %}?periodo={{ periodo_actual }}" class="sidebar-sublink {% if modulo_activo == 'actividades' %}active{% endif %}">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25z"/></svg>
    Actividades
  </a>
</div>

<script>
// Redirigir al periodo guardado si no hay ?periodo= en la URL
(function(){
  const url = new URL(window.location.href);
  if (!url.searchParams.has('periodo')) {
    const saved = localStorage.getItem('periodo');
    if (saved && saved !== '1') {
      url.searchParams.set('periodo', saved);
      window.location.replace(url.toString());
    }
  }
})();
</script>
